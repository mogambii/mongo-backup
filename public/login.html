<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MongoDB Backup Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-wrapper">
                    <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3" stroke="url(#logo-gradient)"></ellipse>
                        <path d="M3 5v6c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke="url(#logo-gradient)"></path>
                        <path d="M3 11v6c0 1.66 4 3 9 3s9-1.34 9-3v-6" stroke="url(#logo-gradient)"></path>
                        <path d="M12 7v7m-3-3l3 3 3-3" stroke="#00ED64" stroke-width="2.5"></path>
                        <defs>
                            <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00ED64" />
                                <stop offset="100%" stop-color="#00f2fe" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>MongoDB Backup Manager</h1>
                <p>Secure Node Access Console</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="password">Console Access Key</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter security key"
                            required
                            autofocus
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Authenticate
                </button>
            </form>

            <div id="errorMessage" class="error-message"></div>
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Verifying credentials...</p>
            </div>
        </div>

        <footer class="login-footer">
            <p>&copy; 2026 MongoDB Backup Manager &bull; v1.0.0</p>
        </footer>
    </div>

    <script src="login.js"></script>
</body>
</html>
